<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Now</title>
  
	
	<link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body>

<div class="container">

    <h1>Weather Now ⛅</h1>

  	<div class="search">
    	<input type="text" id="cityInput" placeholder="Enter city">
    	<button id="searchBtn">Search</button>
  	</div>

  
  	<div id="error" class="hidden"></div>

  
  	<div id="currentWeather" class="card skeleton">
    	<h2 id="cityName"></h2>
    	<p id="temp"></p>
    	<p id="desc"></p>
    	<p id="humidity"></p>
    	<p id="wind"></p>
    	<p id="time"></p>
  	</div>

  	<div id="forecast" class="forecast">
    <!-- 7 cards -->
  	</div>

</div>

<script>

var typeTimer;

var CODES = {
  0: "Clear ☀️",
  1: "Mainly Clear 🌤️",
  2: "Partly Cloudy ⛅",
  3: "Overcast ☁️",
  61: "Rain 🌧️"
};

//function

	function showForecastSkeletons() {
  		var row = document.getElementById("forecast");
  		row.innerHTML = "";
  		for (var i = 0; i < 7; i++) {
    	row.innerHTML += '<div class="day-card"><div class="skeleton">day</div>';
  		}
	}

function getDesc(code) {
  return CODES[code] || "Unknown ❓";
}

function removeSkeleton(id) {
  document.getElementById(id).classList.remove("skeleton");
}

function showError(msg) {
  var el = document.getElementById("error");
  if (!msg) {
    el.style.display = "none";
  } else {
    el.style.display = "block";
    el.textContent = msg;
  }
}

	function getWeather(code) {
  		return CODES[code] || ["Unknown", "❓"];
	}

  document.getElementById("searchBtn").addEventListener("click", function () {
  var city = document.getElementById("cityInput").value.trim();
  search(city);
});


	async function getCoords(city) {
  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, 10000); // 10s timeout

  var url = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1";
  var res = await fetch(url, { signal: controller.signal });
  clearTimeout(timer);

  if (!res.ok) throw new Error("Geocoding error: " + res.status); // Step 16
  var data = await res.json();
  if (!data.results || data.results.length === 0) return null;    // Step 6

  return { name: data.results[0].name, country: data.results[0].country,
         lat: data.results[0].latitude, lon: data.results[0].longitude,
         timezone: data.results[0].timezone };
}

	async function fetchWeather(lat, lon) {

    var controller = new AbortController();                          
    var timer = setTimeout(function() { controller.abort(); }, 10000);

    var url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat
      + "&longitude=" + lon
      + "&current_weather=true"
      + "&hourly=relativehumidity_2m,windspeed_10m"
      + "&daily=temperature_2m_max,temperature_2m_min,weathercode"
      + "&forecast_days=7";

    var res = await fetch(url, { signal: controller.signal });       // ADD: pass signal
    clearTimeout(timer);                                             // ADD: cancel timer on success

    if (!res.ok) throw new Error("Weather error: " + res.status);

    return await res.json();
  }

	function fillCurrentCard(cityInfo, data) {
  var cw = data.current_weather;

  document.getElementById("cityName").textContent =
    cityInfo.name + ", " + cityInfo.country;

  document.getElementById("temp").textContent =
    cw.temperature + "°C";

  document.getElementById("desc").textContent =
    getDesc(cw.weathercode);

  document.getElementById("humidity").textContent =
    "💧 " + data.hourly.relativehumidity_2m[0] + "%";

  document.getElementById("wind").textContent =
    "💨 " + cw.windspeed + " km/h";

  removeSkeleton("currentWeather");
}

// NEW FUNCTION — fills the 7 forecast cards below the main card
function fillForecast(data) {
  var row = document.getElementById("forecast");
  row.innerHTML = ""; // clear skeletons

  for (var i = 0; i < 7; i++) {
    var date    = new Date(data.daily.time[i] + "T12:00:00");
    var dayName = date.toLocaleDateString("en-US", { weekday: "short" });
    var code    = data.daily.weathercode[i];
    var desc    = getDesc(code);
    var hi      = Math.round(data.daily.temperature_2m_max[i]) + "°C";
    var lo      = Math.round(data.daily.temperature_2m_min[i]) + "°C";

    row.innerHTML +=
      '<div class="day-card">' +
        '<p><strong>' + dayName + '</strong></p>' +
        '<p style="font-size:1.4rem">' + desc + '</p>' +
        '<p style="color:#ff8a65">' + hi + '</p>' +
        '<p style="color:#90a4ae">' + lo + '</p>' +
      '</div>';
  }
}


//task3 jguery ajax
function fetchTime(timezone) {
  $.getJSON("https://worldtimeapi.org/api/timezone/" + timezone)

    .done(function(data) {
      // Success: show real local time
      var timeStr = new Date(data.datetime).toLocaleTimeString();
      document.getElementById("time").textContent = "🕐 " + timeStr;
      unSkeleton("time");
    })

    .fail(function() {
      // Failed: fall back to the device clock
      document.getElementById("time").textContent = "🕐 " + new Date().toLocaleTimeString();
      unSkeleton("time");
    })

    .always(function() {
      // Runs no matter what — log timestamp to console
      console.log("WorldTimeAPI done at: " + new Date().toISOString());
    });
}



//task4
async function search(city) {

  showError(""); // clear error

  if (!city || city.trim().length < 2) {
    showError("⚠️ Type at least 2 characters");
    return;
  }

  try {
    var cityInfo = await getCoords(city);

    if (!cityInfo) {
      showError("❌ City not found");
      return;
    }

    var data = await fetchWeather(cityInfo.lat, cityInfo.lon);

    fillCurrentCard(cityInfo, data);

    fetchTime(cityInfo.timezone); // jQuery part

  } catch (err) {
    if (err.name === "AbortError") {
      showError("⏱️ Timeout");
    } else {
      showError("❌ " + err.message);
    }
  }
}

	document.getElementById("cityInput").addEventListener("input", function() {
  clearTimeout(typeTimer);          // cancel old timer every keystroke
  var city = this.value.trim();
  typeTimer = setTimeout(function() {
    if (city.length >= 2) search(city);
  }, 500);                          // only search after 500ms of silence
});

</script>



	
</body>
</html>
